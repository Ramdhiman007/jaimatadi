<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard - Technical Help Hub</title>
  <meta name="robots" content="noindex, nofollow">
  
  <!-- Theme Flash Protection -->
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <script src="assets/js/components.js" defer></script>
  <script src="assets/js/app.js" defer></script>
  <style>
    .admin-grid {
      display: grid;
      gap: 2.5rem;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      margin-top: 2rem;
    }

    .data-item {
      background: var(--bg-surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      position: relative;
      transition: var(--transition-base);
      box-shadow: var(--shadow-sm);
    }

    .data-item:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .data-item h3 {
      margin-top: 0;
      font-size: 1.25rem;
      padding-right: 4rem;
      color: var(--text-main);
    }

    .btn-delete {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fee2e2;
      padding: 0.4rem 0.75rem;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: var(--transition-base);
    }

    .btn-delete:hover {
      background: #fee2e2;
      border-color: #fecaca;
      transform: scale(1.05);
    }

    .section-header {
      border-bottom: 2px solid var(--brand-primary);
      padding-bottom: 0.75rem;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .section-header h2 {
      margin: 0;
      font-size: 1.5rem;
    }

    .badge-count {
      background: var(--bg-surface-alt);
      color: var(--text-muted);
      padding: 0.2rem 0.75rem;
      border-radius: var(--radius-full);
      font-size: 0.85rem;
      font-weight: 700;
    }
  </style>
</head>

<body>

  <header class="site-header"></header>

  <main class="container">
    <div id="loginPrompt" style="display:none; text-align: center; margin-top: 4rem;">
      <h1>Admin Access Required</h1>
      <p class="muted">Please login to view this page.</p>
      <a href="login.html?redirect=admin.html" class="btn">Go to Login</a>
    </div>

    <div id="dashboard" style="display:none">
      <h1>Dashboard</h1>
      <p class="muted" style="margin-bottom: 2rem;">Manage user submissions and messages.</p>

      <div class="admin-grid">
        <div>
          <div class="section-header">
            <h2>Feature Requests</h2>
            <span id="subsCount" class="badge-count">0</span>
          </div>
          <div id="subsList" style="display: grid; gap: 1.5rem;"></div>
        </div>

        <div>
          <div class="section-header" style="border-color: var(--brand-secondary);">
            <h2>Contact Messages</h2>
            <span id="msgsCount" class="badge-count">0</span>
          </div>
          <div id="msgsList" style="display: grid; gap: 1.5rem;"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/js/app.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = Auth.getUser();
      if (!user) {
        document.getElementById('loginPrompt').style.display = 'block';
        return;
      }

      document.getElementById('dashboard').style.display = 'block';

      document.getElementById('logoutBtn').addEventListener('click', () => {
        Auth.logout();
        window.location.href = 'index.html';
      });

      // Render Submissions
      const subs = Store.get('submissions', []);
      document.getElementById('subsCount').textContent = subs.length;
      const subsContainer = document.getElementById('subsList');
      if (subs.length === 0) subsContainer.innerHTML = '<p class="muted">No submissions yet.</p>';
      else {
        subsContainer.innerHTML = subs.map((s, i) => `
      <div class="data-item">
        <button class="btn-delete" onclick="deleteItem('submissions', ${i})">Delete</button>
        <h3>${s.title}</h3>
        <p class="muted" style="font-size: 0.85rem; margin-bottom: 0.5rem;">From: <strong>${s.name}</strong> (${s.email})</p>
        <p class="muted" style="font-size: 0.85rem; margin-bottom: 1rem;">OS: ${s.os} | Category: ${s.category}</p>
        <div style="margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--bg-surface-alt); font-size: 0.95rem;">${s.desc}</div>
        <div style="margin-top: 1.5rem; text-align: right;"><small class="muted">${new Date(s.date).toLocaleDateString()}</small></div>
      </div>
    `).join('');
      }

      // Render Messages
      const msgs = Store.get('messages', []);
      document.getElementById('msgsCount').textContent = msgs.length;
      const msgsContainer = document.getElementById('msgsList');
      if (msgs.length === 0) msgsContainer.innerHTML = '<p class="muted">No messages yet.</p>';
      else {
        msgsContainer.innerHTML = msgs.map((m, i) => `
      <div class="data-item">
        <button class="btn-delete" onclick="deleteItem('messages', ${i})">Delete</button>
        <h3>${m.subject}</h3>
        <p class="muted" style="font-size: 0.85rem; margin-bottom: 0.5rem;">From: <strong>${m.name}</strong> (${m.email})</p>
        <div style="margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--bg-surface-alt); font-size: 0.95rem;">${m.message}</div>
        <div style="margin-top: 1.5rem; text-align: right;"><small class="muted">${new Date(m.date).toLocaleDateString()}</small></div>
      </div>
    `).join('');
      }
    });

    // Global scope for onclick handlers
    window.deleteItem = function (key, index) {
      if (!confirm('Are you sure you want to delete this item?')) return;
      const items = Store.get(key, []);
      items.splice(index, 1);
      Store.set(key, items);
      location.reload();
    };
  </script>
  <footer class="site-footer"></footer>
</body>

</html>
