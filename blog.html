<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog - Technical Help Hub</title>
  <meta name="description" content="Stay updated with the latest tech tips, software testing trends, and troubleshooting tutorials. Expert insights to keep your devices running and your skills sharp.">
  <meta name="keywords" content="Tech Blog, QA Trends, Troubleshooting Tips, Computer Help, Software Software Testing">
  
  <!-- Theme Flash Protection -->
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <script src="assets/js/components.js" defer></script>
  <script src="assets/js/app.js" defer></script>
</head>

<body>

  <header class="site-header"></header>

  <div class="container" style="margin-top: 2rem;">
    <div class="ad-unit ad-top-banner">
      <!-- AD_PLACEHOLDER_TOP_BANNER -->
    </div>
  </div>

  <main class="container">
    <div class="list-header" style="justify-content: center; margin-bottom: 3rem; text-align: center;">
      <div>
        <h1>Latest Tech Tips & News</h1>
        <p class="muted">Insights, tutorials, and updates from our experts.</p>
      </div>
    </div>

    <div id="blog-grid" class="cards">
      <!-- Posts injected here -->
    </div>
    </div>
  </main>

  <div class="container">
    <div class="ad-unit ad-footer-banner">
      <!-- AD_PLACEHOLDER_FOOTER_BANNER -->
    </div>
  </div>

  <footer class="site-footer"></footer>


  <script>
    const posts = [
      {
        title: 'How to Extend Laptop Battery Life',
        date: 'Oct 24, 2023',
        excerpt: 'Simple tips to squeeze more juice out of your battery, from power settings to screen brightness.',
        img: 'assets/img/blog/battery.svg',
        tag: 'Hardware'
      },
      {
        title: 'Essential Backup Strategies',
        date: 'Nov 02, 2023',
        excerpt: 'The 3-2-1 rule explained: why you need multiple cloud and local copies of your data.',
        img: 'assets/img/blog/backup.svg',
        tag: 'Data'
      },
      {
        title: 'Speed Up Windows 11',
        date: 'Nov 15, 2023',
        excerpt: 'Is your PC sluggish? Here are 5 quick tweaks to make Windows 11 fly again.',
        img: 'assets/img/blog/windows.svg',
        tag: 'Performance'
      },
      {
        title: 'Recognizing Phishing Emails',
        date: 'Dec 05, 2023',
        excerpt: 'Learn the tell-tale signs of a scam email before you click that dangerous link.',
        img: 'assets/img/blog/security.svg',
        tag: 'Security'
      },
      {
        title: 'Wi-Fi 6 vs Wi-Fi 6E: What’s the Difference?',
        date: 'Jan 10, 2024',
        excerpt: 'Understanding the new wireless standards and whether you need to upgrade your router.',
        img: 'assets/img/blog/wifi.svg',
        tag: 'Network'
      }
    ];

    const grid = document.getElementById('blog-grid');
    grid.innerHTML = posts.map(post => `
  <article class="card" style="display: flex; flex-direction: column; gap: 1rem;">
    <div style="height: 160px; background: var(--bg-surface-alt); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; overflow: hidden;">
        <span style="font-size: 3rem;">📰</span>
    </div>
    <div>
        <div class="meta" style="margin-bottom: 0.5rem;">
            <span class="badge" style="background: var(--bg-surface-alt);">${post.tag}</span>
            <span class="muted" style="font-size: 0.875rem;">${post.date}</span>
        </div>
        <h3 style="margin-bottom: 0.5rem;">
            <a href="#" style="text-decoration: none; color: inherit;">${post.title}</a>
        </h3>
        <p class="muted">${post.excerpt}</p>
    </div>
    <a href="#" class="btn btn-sm btn-secondary" style="margin-top: auto; align-self: flex-start;">Read Article</a>
  </article>
`).join('');
  </script>
</body>

</html>
