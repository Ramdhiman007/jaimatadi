<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Us - Technical Help Hub</title>
  <meta name="description" content="Have a technical problem or a question about QA testing? Contact the Technical Help Hub team for expert support and guidance.">
  <meta name="keywords" content="Contact Technical Support, QA Help, Tech Support, PC Fix, Mobile Fix">
  
  <!-- Theme Flash Protection -->
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <script src="assets/js/components.js" defer></script>
  <script src="assets/js/app.js" defer></script>
</head>

<body>

  <header class="site-header"></header>

  <main class="container">
    <div class="grid"
      style="grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 4rem; align-items: start;">

      <!-- Contact Info -->
      <div>
        <h1>Get in Touch</h1>
        <p class="muted" style="margin-bottom: 2rem;">Have a question, suggestion, or just want to say hi? We'd love to
          hear from you.</p>

        <div style="display: grid; gap: 1.5rem;">
          <div class="card" style="display: flex; gap: 1rem; align-items: center;">
            <div
              style="width: 40px; height: 40px; background: var(--bg-surface-alt); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.25rem;">
              📧</div>
            <div>
              <h3 style="margin: 0; font-size: 1rem;">Email Us</h3>
              <p class="muted" style="margin: 0;">support@technicalhelphub.com</p>
            </div>
          </div>

          <div class="card" style="display: flex; gap: 1rem; align-items: center;">
            <div
              style="width: 40px; height: 40px; background: var(--bg-surface-alt); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.25rem;">
              💬</div>
            <div>
              <h3 style="margin: 0; font-size: 1rem;">Live Chat</h3>
              <p class="muted" style="margin: 0;">Available Mon-Fri, 9am - 5pm EST</p>
            </div>
          </div>

          <div class="card" style="display: flex; gap: 1rem; align-items: center;">
            <div
              style="width: 40px; height: 40px; background: var(--bg-surface-alt); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.25rem;">
              📍</div>
            <div>
              <h3 style="margin: 0; font-size: 1rem;">Location</h3>
              <p class="muted" style="margin: 0;">123 Tech Street, Silicon Valley, CA</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Contact Form -->
      <div class="card">
        <h2 style="margin-bottom: 1.5rem;">Send us a message</h2>
        <form id="contactForm">
          <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" required placeholder="John Doe">
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="john@example.com">
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <select id="subject" required>
              <option value="" disabled selected>Select a subject</option>
              <option>General Inquiry</option>
              <option>Technical Support</option>
              <option>Feedback</option>
              <option>Partnership</option>
            </select>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" rows="5" required placeholder="How can we help you?"></textarea>
          </div>

          <div class="form-group mb-4">
            <label>Human Verification</label>
            <div id="captcha" class="captcha-mount"
              style="background: var(--bg-surface-alt); padding: 1.25rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center;">
            </div>
          </div>

          <button type="submit" class="btn btn-block">Send Message</button>
          <div id="msg" class="alert ok mt-4" style="display:none"></div>
        </form>
      </div>

    </div>
  </main>

  <footer class="site-footer"></footer>


  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // If logged in, pre-fill
      const user = Auth.getUser();
      if (user) {
        document.getElementById('name').value = user.name || '';
        document.getElementById('email').value = user.email || '';
      }

      // Init Captcha
      const captchaId = Captcha.create('captcha');

      document.getElementById('contactForm').addEventListener('submit', e => {
        e.preventDefault();

        if (!Captcha.validate(captchaId)) {
          alert('Incorrect captcha answer.');
          return;
        }

        const data = {
          id: 'msg-' + Date.now(),
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          subject: document.getElementById('subject').value,
          message: document.getElementById('message').value,
          date: new Date().toISOString()
        };

        const messages = Store.get('messages', []);
        messages.push(data);
        Store.set('messages', messages);

        const msg = document.getElementById('msg');
        msg.style.display = 'block';
        msg.textContent = 'Message sent! We\'ll get back to you shortly.';
        e.target.reset();

        // Reset Captcha
        Captcha.create('captcha');
      });
    });
  </script>
</body>

</html>
